<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src http://127.0.0.1:* http://localhost:*; img-src 'self' data:;">
<title>项目地图 · 小哒 Coda</title>
<style>
:root{
  --bg:#ece7de;--card:#fffdf8;--ink:#2b2723;--sub:#6b6258;
  --accent:#e0623a;--accent-light:#f48e6c;--line:#ddd5c8;--pill:#f0eadf;
  --user:#3f7d8f;--project:#e0623a;--industry:#3f8f5b;--word:#d98a2b;
  --file:#8a8276;--wheel:#7a5fa3;--redline:#c0452f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.wrap{display:flex;flex-direction:column;height:100vh}

/* 顶部 */
.head{padding:14px 18px 12px;border-bottom:1px solid var(--line);background:var(--bg);flex:none}
.title-row{display:flex;align-items:center;gap:12px}
.logo{font-size:30px;line-height:1}
.title{font-family:Georgia,"Songti SC",serif;font-size:18px;font-weight:700}
.kicker{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:999px;margin-right:8px}
.tag{font-size:12px;color:var(--sub);margin-top:1px}
.toolbar{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap}
.btn{font-size:12.5px;font-weight:700;padding:6px 14px;border:none;border-radius:8px;cursor:pointer;background:var(--accent);color:#fff;transition:filter .12s,transform .08s}
.btn:hover{filter:brightness(1.07)} .btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.search{flex:1;min-width:160px;max-width:280px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);font:inherit;font-size:13px;color:var(--ink);outline:none}
.search:focus{border-color:var(--accent)}
.meta{font-size:12px;color:var(--sub);margin-left:auto;font-family:"SF Mono",Menlo,monospace}

/* 主区 */
.body{flex:1;display:flex;overflow:hidden}
.canvas-wrap{flex:1;position:relative;background:var(--bg)}
canvas{display:block;width:100%;height:100%;cursor:grab}
canvas.dragging{cursor:grabbing}

/* 浮动控制 */
.zoom-ctrl{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:2px;z-index:5}
.zoom-ctrl button{width:32px;height:32px;background:var(--card);border:1px solid var(--line);font-size:16px;color:var(--ink);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .12s}
.zoom-ctrl button:hover{border-color:var(--accent);color:var(--accent)}

/* 侧栏 */
.sidebar{width:260px;border-left:1px solid var(--line);background:var(--card);overflow-y:auto;padding:14px}
.sidebar h3{font-family:Georgia,serif;font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:.02em}
.legend{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;padding:4px 6px;border-radius:5px;transition:background .12s}
.legend-row:hover{background:var(--pill)}
.legend-row.off{opacity:.4}
.legend-row .swatch{width:14px;height:14px;border-radius:50%;flex:none}
.legend-row .nm{flex:1;font-weight:500}
.legend-row .ct{color:var(--sub);font-family:"SF Mono",monospace;font-size:11px}
.detail{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
.detail.empty{display:none}
.detail .nm{font-family:Georgia,serif;font-size:15px;font-weight:700;margin-bottom:4px;word-break:break-all}
.detail .ty{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#fff;padding:2px 7px;border-radius:4px;margin-bottom:9px}
.detail .row{display:flex;gap:6px;padding:4px 0;font-size:12px;border-bottom:1px dashed var(--line)}
.detail .row:last-child{border-bottom:none}
.detail .row .k{color:var(--sub);min-width:60px}
.detail .row .v{flex:1;color:var(--ink);word-break:break-all;font-family:"SF Mono",monospace;font-size:11.5px}
.detail .row.linked{font-family:inherit;font-size:12px}
.detail .row.linked .v{font-family:inherit;font-size:12px;cursor:pointer;color:var(--accent)}
.detail .row.linked .v:hover{text-decoration:underline}

/* 状态条 */
.status{position:absolute;left:14px;bottom:14px;font-size:11px;color:var(--sub);background:rgba(252,250,243,.85);backdrop-filter:blur(6px);padding:4px 10px;border-radius:5px;font-family:"SF Mono",monospace}
.empty-state{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--sub);font-size:13px;text-align:center;padding:20px}
.empty-state .icon{font-size:42px;margin-bottom:14px;opacity:.6}
.empty-state .hint{font-size:12px;margin-top:8px;opacity:.7}
</style>
</head>
<body>
<div class="wrap">

  <header class="head">
    <div class="title-row">
      <div class="logo">🐕</div>
      <div>
        <div><span class="kicker">回车键 · 知识图谱</span></div>
        <div class="title">项目地图 · 知识图谱</div>
        <div class="tag">小哒越扫越懂你的「记忆图」· 鼠标拖动 / 滚轮缩放 / 点击节点看详情</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn" id="refresh">🔄 刷新</button>
      <button class="btn ghost" id="recenter">⌖ 居中</button>
      <input class="search" id="search" type="text" placeholder="搜索节点（名称模糊匹配）...">
      <span class="meta" id="metaCount">载入中…</span>
    </div>
  </header>

  <div class="body">
    <div class="canvas-wrap" id="stage">
      <canvas id="canvas"></canvas>
      <div class="zoom-ctrl">
        <button data-zoom="1.25">＋</button>
        <button data-zoom="0.8">－</button>
        <button id="recenter2" title="居中">⌖</button>
      </div>
      <div class="status" id="status"></div>
      <div class="empty-state" id="empty" style="display:none">
        <div class="icon">🕸️</div>
        <div>暂无图谱数据</div>
        <div class="hint">先用小哒扫一两个项目（POST /scan），KG 就会自动建立起来</div>
      </div>
    </div>
    <aside class="sidebar">
      <h3>节点类型（点击切换显隐）</h3>
      <div class="legend" id="legend"></div>
      <div class="detail empty" id="detail"></div>
    </aside>
  </div>
</div>

<script>
'use strict';
/* ──────────────────────────────────────────────────────────────────
 * 项目地图 · 小哒 Coda
 *
 * 力布局算法基于 agentmemory viewer (MIT)
 *   https://github.com/rohitg00/agentmemory
 *   src/viewer/index.html runSimulation/renderGraph
 *
 * 移植要点：
 *   1. 节点数自适应的 repulsion/attraction/centerGravity/velocityCap
 *   2. tickCount 渐进 damping（coolBoost），让布局收敛
 *   3. RMS 速度低于阈值后 auto-park，CPU 友好
 *   4. canvas 渲染 + 曲线边 + 焦点/搜索 dimming + 局部 zoom-pan
 * ────────────────────────────────────────────────────────────────── */

const NODE_COLORS = {
  User: '#3f7d8f', Project: '#e0623a', Industry: '#3f8f5b',
  IndustryWord: '#d98a2b', File: '#8a8276', Wheel: '#7a5fa3', Redline: '#c0452f'
};
const NODE_SHAPES = {
  User: 'hexagon', Project: 'circle', Industry: 'diamond',
  IndustryWord: 'circle', File: 'rect', Wheel: 'rect', Redline: 'diamond'
};
const TYPE_LABELS = {
  User: '👤 用户', Project: '📁 项目', Industry: '🏭 行业',
  IndustryWord: '🔤 行业词', File: '📄 文件', Wheel: '🔧 轮子', Redline: '⛔ 红线'
};
const TYPE_DESCRIPTIONS = {
  User: '当前桌面用户', Project: '扫过的代码项目', Industry: '识别出的行业',
  IndustryWord: '行业关键词', File: '项目中的源文件', Wheel: '可复用片段', Redline: '行业合规红线'
};

const PORT = (new URLSearchParams(location.search)).get('port') || '8848';
const $ = (s) => document.querySelector(s);

const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
const stage = $('#stage');

// 状态
const state = {
  raw: { nodes: [], links: [] },
  nodes: [], edges: [],
  filters: {}, // {type: bool}
  selectedId: null,
  search: '',
};

const sim = {
  raf: 0, running: false, tickCount: 0, quietTicks: 0,
  zoom: 1, panX: 0, panY: 0,
  mouseX: 0, mouseY: 0,
  dragNode: null, dragPan: false, panStartX: 0, panStartY: 0,
};

// ── DPR 适配 ────────────────────────────────────────────────
function sizeCanvas() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = stage.clientWidth, h = stage.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── 数据加载 ─────────────────────────────────────────────────
async function loadKG() {
  $('#status').textContent = '载入中…';
  try {
    const r = await fetch(`http://127.0.0.1:${PORT}/kg/graph`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    state.raw = await r.json();
  } catch (e) {
    $('#status').textContent = '连接 8848 失败：' + e.message;
    $('#empty').style.display = 'flex';
    $('#empty').querySelector('div:nth-child(2)').textContent = '连不上后端';
    $('#empty').querySelector('.hint').innerHTML = '请确认 <code style="background:var(--pill);padding:1px 5px;border-radius:3px">cd coda && node server.js</code> 已启动';
    return;
  }

  // 标准化（兼容 agentmemory 风格字段命名）
  state.nodes = (state.raw.nodes || []).map((n) => ({
    id: n.id,
    type: n.kind || n.label || n.group || 'unknown',
    name: n.label || n.name || extractName(n.id),
    properties: n.props || {},
    r: n.size ? Math.max(7, Math.min(18, n.size * 0.55)) : 10,
    x: Math.random() * 800 - 400, y: Math.random() * 600 - 300,
    vx: 0, vy: 0,
  }));
  state.edges = (state.raw.links || []).map((l, i) => ({
    id: 'E:' + i,
    sourceNodeId: l.source, targetNodeId: l.target,
    type: l.type || 'related', weight: l.weight || 0.5,
  }));

  // 初始化 filters：每种 type 默认显示
  state.filters = {};
  state.nodes.forEach((n) => { state.filters[n.type] = true; });

  if (state.nodes.length === 0) {
    $('#empty').style.display = 'flex';
    return;
  }
  $('#empty').style.display = 'none';

  // 重置 sim
  sim.tickCount = 0; sim.quietTicks = 0; sim.zoom = 1; sim.panX = 0; sim.panY = 0;
  startSim();
  buildLegend();
  $('#metaCount').textContent = `${state.nodes.length} 节点 · ${state.edges.length} 边`;
  $('#status').textContent = '✓ 载入完成';
}

function extractName(id) {
  // id 形如 "P:/path/to/proj"、"IW:medical::patient"、"F:P:/abs::src/api/booking.js"
  if (typeof id !== 'string') return String(id);
  if (id.startsWith('P:')) return id.split('/').pop() || id.slice(2);
  if (id.startsWith('IW:')) return id.split('::').pop();
  if (id.startsWith('F:')) return id.split('::').pop() || id.slice(2);
  if (id.startsWith('W:')) return id.split('::').pop();
  if (id.startsWith('R:')) return id.split('::').pop();
  if (id.startsWith('I:')) return id.slice(2);
  return id;
}

// ── 力布局（移植自 agentmemory viewer · MIT）────────────────
function startSim() {
  if (sim.raf) cancelAnimationFrame(sim.raf);
  sim.running = true;
  sim.raf = requestAnimationFrame(runSimulation);
}
function wakeSim() {
  sim.quietTicks = 0;
  if (!sim.running) { sim.running = true; sim.tickCount = Math.min(sim.tickCount, 500); }
  if (!sim.raf) sim.raf = requestAnimationFrame(runSimulation);
}

function runSimulation() {
  if (!sim.running) return;
  const nodes = state.nodes, edges = state.edges;
  const nodeCount = nodes.length;
  sim.tickCount++;

  // —— agentmemory 的自适应力参数（节点数越多，参数越激进）——
  const coolBoost = Math.min(0.4, sim.tickCount / 1500);
  const damping = 0.9 - coolBoost;
  const repulsion = nodeCount > 1000 ? 3000 : nodeCount > 100 ? 2000 : nodeCount > 50 ? 1200 : 800;
  const attraction = nodeCount > 100 ? 0.002 : 0.005;
  const centerGravity = nodeCount > 1000 ? 0.012 : nodeCount > 100 ? 0.005 : 0.01;
  const velocityCap = nodeCount > 1000 ? 6 : nodeCount > 200 ? 12 : 24;

  const nodeMap = {};
  nodes.forEach((n) => { nodeMap[n.id] = n; });

  // 库仑斥力 + 向心力
  for (let i = 0; i < nodes.length; i++) {
    if (sim.dragNode === nodes[i]) continue;
    const n = nodes[i];
    let fx = 0, fy = 0;
    for (let j = 0; j < nodes.length; j++) {
      if (i === j) continue;
      const dx = n.x - nodes[j].x, dy = n.y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = repulsion / (dist * dist);
      fx += (dx / dist) * force;
      fy += (dy / dist) * force;
    }
    fx -= n.x * centerGravity;
    fy -= n.y * centerGravity;
    let nvx = (n.vx + fx) * damping;
    let nvy = (n.vy + fy) * damping;
    if (nvx > velocityCap) nvx = velocityCap; else if (nvx < -velocityCap) nvx = -velocityCap;
    if (nvy > velocityCap) nvy = velocityCap; else if (nvy < -velocityCap) nvy = -velocityCap;
    n.vx = nvx; n.vy = nvy;
  }

  // 边弹簧（rest length = 100）
  edges.forEach((e) => {
    const s = nodeMap[e.sourceNodeId], t = nodeMap[e.targetNodeId];
    if (!s || !t) return;
    const dx = t.x - s.x, dy = t.y - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = (dist - 100) * attraction;
    const fx = (dx / dist) * f, fy = (dy / dist) * f;
    if (sim.dragNode !== s) { s.vx += fx; s.vy += fy; }
    if (sim.dragNode !== t) { t.vx -= fx; t.vy -= fy; }
  });

  // 步进 + RMS 速度计算（用于 auto-park）
  let ke = 0;
  nodes.forEach((n) => {
    if (sim.dragNode === n) return;
    n.x += n.vx; n.y += n.vy;
    ke += n.vx * n.vx + n.vy * n.vy;
  });
  const rms = nodes.length ? Math.sqrt(ke / nodes.length) : 0;
  if (rms < 0.05 && sim.tickCount > 60 && !sim.dragNode) sim.quietTicks++;
  else sim.quietTicks = 0;

  renderGraph();

  if (sim.quietTicks > 30) {
    sim.raf = 0; sim.running = false; return;
  }
  sim.raf = requestAnimationFrame(runSimulation);
}

// ── 渲染 ─────────────────────────────────────────────────────
function renderGraph() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = canvas.width / dpr, h = canvas.height / dpr;
  ctx.clearRect(0, 0, w, h);

  // 暖米格栅背景
  ctx.save();
  ctx.strokeStyle = 'rgba(43,39,35,.04)'; ctx.lineWidth = .5;
  for (let gx = 0; gx < w; gx += 24) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke(); }
  for (let gy = 0; gy < h; gy += 24) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke(); }
  ctx.restore();

  // 应用 viewport（pan + zoom 以画布中心为原点）
  ctx.save();
  ctx.translate(w / 2 + sim.panX, h / 2 + sim.panY);
  ctx.scale(sim.zoom, sim.zoom);

  const nodeMap = {};
  state.nodes.forEach((n) => { nodeMap[n.id] = n; });

  const searchActive = state.search.length > 0;
  const visCount = state.nodes.filter((n) => state.filters[n.type]).length;
  const isDense = visCount > 40;
  const labelZoomTh = isDense ? 1.4 : 0.5;

  // 焦点：选中 > hover
  let hoverId = null;
  if (!sim.dragNode) {
    const rect = canvas.getBoundingClientRect();
    const hx = (sim.mouseX - rect.left - w / 2 - sim.panX) / sim.zoom;
    const hy = (sim.mouseY - rect.top - h / 2 - sim.panY) / sim.zoom;
    for (let i = state.nodes.length - 1; i >= 0; i--) {
      const n = state.nodes[i];
      if (!state.filters[n.type]) continue;
      const dx = n.x - hx, dy = n.y - hy;
      if (dx * dx + dy * dy < n.r * n.r + 25) { hoverId = n.id; break; }
    }
  }
  const focusId = state.selectedId || hoverId;

  // 边
  state.edges.forEach((e) => {
    const s = nodeMap[e.sourceNodeId], t = nodeMap[e.targetNodeId];
    if (!s || !t) return;
    if (!state.filters[s.type] || !state.filters[t.type]) return;

    const dimmed = searchActive && !(s.name.toLowerCase().includes(state.search) || t.name.toLowerCase().includes(state.search));
    const linked = focusId && (e.sourceNodeId === focusId || e.targetNodeId === focusId);
    const hasFocus = focusId !== null;
    const lw = linked ? 2 + e.weight * 2 : 1 + e.weight * 1.5;

    const dx = t.x - s.x, dy = t.y - s.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const curveOff = isDense ? 12 : 18;
    const cpx = (s.x + t.x) / 2 + (-dy / len) * curveOff;
    const cpy = (s.y + t.y) / 2 + (dx / len) * curveOff;

    const color = NODE_COLORS[s.type] || '#8a8276';
    const r = parseInt(color.slice(1, 3), 16);
    const g = parseInt(color.slice(3, 5), 16);
    const b = parseInt(color.slice(5, 7), 16);
    let alpha;
    if (dimmed) alpha = 0.06;
    else if (hasFocus && linked) alpha = 0.7;
    else if (hasFocus) alpha = 0.08;
    else alpha = isDense ? 0.18 : 0.32;

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.quadraticCurveTo(cpx, cpy, t.x, t.y);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = lw;
    ctx.stroke();

    // 边标签（缩放足够大才显示，避免视觉噪声）
    if (e.type && !dimmed && (linked ? sim.zoom > 0.6 : sim.zoom > labelZoomTh)) {
      ctx.save();
      ctx.fillStyle = `rgba(43,39,35,${linked ? 0.85 : 0.55})`;
      const fs = (10 / sim.zoom).toFixed(1);
      ctx.font = `500 ${fs}px -apple-system, "PingFang SC", sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(e.type, (s.x + t.x) / 2, (s.y + t.y) / 2 - 4);
      ctx.restore();
    }
  });

  // 节点
  state.nodes.forEach((n) => {
    if (!state.filters[n.type]) return;
    const dimmed = searchActive && !n.name.toLowerCase().includes(state.search);
    const isFocus = n.id === focusId;
    const hasFocus = focusId !== null;
    const isLinked = focusId && state.edges.some((e) =>
      (e.sourceNodeId === focusId && e.targetNodeId === n.id) ||
      (e.targetNodeId === focusId && e.sourceNodeId === n.id));

    let alpha;
    if (dimmed) alpha = 0.15;
    else if (hasFocus && !isFocus && !isLinked) alpha = 0.18;
    else alpha = 1;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = NODE_COLORS[n.type] || '#8a8276';
    drawNodeShape(ctx, n.x, n.y, n.r, n.type);
    ctx.fill();

    if (isFocus) {
      ctx.strokeStyle = '#2b2723'; ctx.lineWidth = 2.5 / sim.zoom; ctx.stroke();
    } else if (isLinked) {
      ctx.strokeStyle = NODE_COLORS[n.type] || '#8a8276'; ctx.lineWidth = 1.5 / sim.zoom; ctx.stroke();
    }

    // 节点标签
    if (sim.zoom > 0.4 && !dimmed) {
      ctx.fillStyle = isFocus ? '#2b2723' : 'rgba(43,39,35,.78)';
      const fs = ((n.r > 12 ? 11 : 10) / sim.zoom).toFixed(1);
      ctx.font = `${isFocus ? 700 : 500} ${fs}px -apple-system, "PingFang SC", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const label = n.name.length > 14 ? n.name.slice(0, 14) + '…' : n.name;
      ctx.fillText(label, n.x, n.y + n.r + 3);
    }
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function drawNodeShape(c, x, y, r, type) {
  const shape = NODE_SHAPES[type] || 'circle';
  c.beginPath();
  if (shape === 'rect') {
    c.rect(x - r, y - r * 0.75, r * 2, r * 1.5);
  } else if (shape === 'diamond') {
    c.moveTo(x, y - r); c.lineTo(x + r, y); c.lineTo(x, y + r); c.lineTo(x - r, y); c.closePath();
  } else if (shape === 'hexagon') {
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 2;
      const hx = x + r * Math.cos(a), hy = y + r * Math.sin(a);
      if (i === 0) c.moveTo(hx, hy); else c.lineTo(hx, hy);
    }
    c.closePath();
  } else {
    c.arc(x, y, r, 0, Math.PI * 2);
  }
}

// ── 侧栏 legend + 详情 ──────────────────────────────────────
function buildLegend() {
  const groups = {};
  state.nodes.forEach((n) => { groups[n.type] = (groups[n.type] || 0) + 1; });
  const html = Object.entries(groups).sort((a, b) => b[1] - a[1]).map(([t, c]) => {
    const off = state.filters[t] ? '' : ' off';
    return `<div class="legend-row${off}" data-type="${t}" title="${TYPE_DESCRIPTIONS[t] || ''}">
      <span class="swatch" style="background:${NODE_COLORS[t] || '#8a8276'}"></span>
      <span class="nm">${TYPE_LABELS[t] || t}</span>
      <span class="ct">${c}</span>
    </div>`;
  }).join('');
  $('#legend').innerHTML = html;
  $('#legend').querySelectorAll('.legend-row').forEach((r) => {
    r.onclick = () => { const t = r.dataset.type; state.filters[t] = !state.filters[t]; r.classList.toggle('off'); wakeSim(); };
  });
}

function renderDetail(node) {
  const el = $('#detail');
  if (!node) { el.classList.add('empty'); el.innerHTML = ''; return; }
  el.classList.remove('empty');
  const color = NODE_COLORS[node.type] || '#8a8276';
  const props = node.properties || {};
  const propsHtml = Object.entries(props).map(([k, v]) => {
    if (typeof v === 'object') v = JSON.stringify(v);
    if (String(v).length > 60) v = String(v).slice(0, 60) + '…';
    return `<div class="row"><span class="k">${esc(k)}</span><span class="v">${esc(String(v))}</span></div>`;
  }).join('');
  // 相邻节点
  const adj = state.edges
    .filter((e) => e.sourceNodeId === node.id || e.targetNodeId === node.id)
    .map((e) => {
      const otherId = e.sourceNodeId === node.id ? e.targetNodeId : e.sourceNodeId;
      const other = state.nodes.find((n) => n.id === otherId);
      return { id: otherId, name: other ? other.name : extractName(otherId), type: e.type };
    });
  const adjHtml = adj.length ? `<div style="margin-top:12px;font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.08em">连接到 ${adj.length} 个节点</div>` +
    adj.slice(0, 12).map((a) =>
      `<div class="row linked"><span class="k">${esc(a.type)}</span><span class="v" data-jump="${esc(a.id)}">${esc(a.name)}</span></div>`
    ).join('') : '';
  el.innerHTML = `
    <div class="nm">${esc(node.name)}</div>
    <span class="ty" style="background:${color}">${TYPE_LABELS[node.type] || node.type}</span>
    ${propsHtml}
    ${adjHtml}
  `;
  el.querySelectorAll('[data-jump]').forEach((v) => {
    v.onclick = () => { state.selectedId = v.dataset.jump; renderDetail(state.nodes.find((n) => n.id === state.selectedId)); wakeSim(); };
  });
}

function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ── 交互：drag node / pan / zoom / click select ────────────
function pickNode(clientX, clientY) {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const rect = canvas.getBoundingClientRect();
  const hx = (clientX - rect.left - w / 2 - sim.panX) / sim.zoom;
  const hy = (clientY - rect.top - h / 2 - sim.panY) / sim.zoom;
  for (let i = state.nodes.length - 1; i >= 0; i--) {
    const n = state.nodes[i];
    if (!state.filters[n.type]) continue;
    const dx = n.x - hx, dy = n.y - hy;
    if (dx * dx + dy * dy < n.r * n.r + 50) return n;
  }
  return null;
}

canvas.addEventListener('pointerdown', (ev) => {
  canvas.setPointerCapture(ev.pointerId);
  const n = pickNode(ev.clientX, ev.clientY);
  if (n) {
    sim.dragNode = n; canvas.classList.add('dragging');
    state.selectedId = n.id; renderDetail(n);
  } else {
    sim.dragPan = true; sim.panStartX = ev.clientX - sim.panX; sim.panStartY = ev.clientY - sim.panY;
    canvas.classList.add('dragging');
    state.selectedId = null; renderDetail(null);
  }
  wakeSim();
});
canvas.addEventListener('pointermove', (ev) => {
  sim.mouseX = ev.clientX; sim.mouseY = ev.clientY;
  if (sim.dragNode) {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = canvas.width / dpr, h = canvas.height / dpr;
    const rect = canvas.getBoundingClientRect();
    sim.dragNode.x = (ev.clientX - rect.left - w / 2 - sim.panX) / sim.zoom;
    sim.dragNode.y = (ev.clientY - rect.top - h / 2 - sim.panY) / sim.zoom;
    sim.dragNode.vx = 0; sim.dragNode.vy = 0;
    wakeSim();
  } else if (sim.dragPan) {
    sim.panX = ev.clientX - sim.panStartX; sim.panY = ev.clientY - sim.panStartY;
    wakeSim();
  } else if (!sim.running) {
    renderGraph(); // hover effect when sim is parked
  }
});
const endDrag = (ev) => {
  if (sim.dragNode || sim.dragPan) wakeSim();
  sim.dragNode = null; sim.dragPan = false; canvas.classList.remove('dragging');
};
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

canvas.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  const factor = ev.deltaY < 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = canvas.width / dpr, h = canvas.height / dpr;
  // 以鼠标为中心缩放
  const wx = ev.clientX - rect.left - w / 2 - sim.panX;
  const wy = ev.clientY - rect.top - h / 2 - sim.panY;
  sim.panX -= wx * (factor - 1);
  sim.panY -= wy * (factor - 1);
  sim.zoom = Math.max(0.15, Math.min(5, sim.zoom * factor));
  if (!sim.raf) renderGraph();
}, { passive: false });

document.querySelectorAll('.zoom-ctrl button[data-zoom]').forEach((b) => {
  b.onclick = () => { sim.zoom = Math.max(0.15, Math.min(5, sim.zoom * parseFloat(b.dataset.zoom))); if (!sim.raf) renderGraph(); };
});

function recenter() { sim.zoom = 1; sim.panX = 0; sim.panY = 0; wakeSim(); }
$('#recenter').onclick = recenter; $('#recenter2').onclick = recenter;
$('#refresh').onclick = loadKG;
$('#search').oninput = (e) => { state.search = e.target.value.trim().toLowerCase(); if (!sim.raf) renderGraph(); };

window.addEventListener('resize', () => { sizeCanvas(); wakeSim(); });

// 暴露给 Electron 主进程
window.codaKGRefresh = loadKG;

// ── 启动 ───────────────────────────────────────────────────
sizeCanvas();
loadKG();
</script>
