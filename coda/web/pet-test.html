<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>小哒桌宠状态验收</title>
<link rel="stylesheet" href="/style.css">
<style>
body{background:#ece7de;font-family:-apple-system,"PingFang SC",sans-serif;color:#2b2620;padding:24px}
h1{font-size:20px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:16px}
.c{background:#fff;border:1px solid #ddd5c9;border-radius:12px;padding:12px;text-align:center}
.c img{width:120px;height:120px;object-fit:contain;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.c .n{font-weight:600;font-size:14px;margin-top:6px}.c .m{font-size:11px;color:#9a9088;margin-top:3px}
.live{margin:16px 0;padding:14px;background:#fff;border:1px dashed #c9bfae;border-radius:12px}
button{font-family:inherit;font-size:13px;padding:6px 12px;border:1px solid #ddd5c9;background:#f0eadf;border-radius:8px;cursor:pointer;margin:2px}
</style></head><body>
<h1>🐾 小哒桌宠 · 12 状态验收（右下角是真实 demo 桌宠）</h1>
<div class="live"><b>逐状态触发：</b><span id="btns"></span> <span id="cur" style="margin-left:10px;color:#e0623a"></span></div>
<div class="grid" id="g"></div>
<!-- 真实桌宠 DOM，复用 app.js 的 pet() -->
<div class="pet"><div class="bubble" id="petBubble"></div><div class="dog" id="petDog"></div></div>
<script>
const PET={idle:['idle.png','待命挥手'],scan:['busy.gif','扫盘中'],think:['think.png','思考'],
done:['done.png','完成'],ask:['ask.png','举手提问'],busy:['busy.gif','忙碌杂耍★'],
happy:['happy.png','高分狂喜'],worry:['worry.png','担忧红线'],reuse:['reuse.png','发现复用'],
sleep:['sleep.png','打盹'],error:['error.png','出错懵圈'],celebrate:['celebrate.png','撒花庆祝']};
const g=document.getElementById('g'),btns=document.getElementById('btns'),cur=document.getElementById('cur');
for(const k in PET){const [f,n]=PET[k];
  g.innerHTML+=`<div class="c"><img src="/pet/${f}" alt="${k}" onerror="this.style.opacity=.2;this.after('❌缺图')"><div class="n">${n}</div><div class="m">${k} · ${f}</div></div>`;
  const b=document.createElement('button');b.textContent=k;b.onclick=()=>{window.__pet(k);cur.textContent='当前：'+k};btns.appendChild(b);
}
// 简化版 pet()（独立于 app.js，专供本验收页）
window.__pet=(s)=>{const [f]=PET[s]||PET.idle;const el=document.getElementById('petDog');
  el.innerHTML='';const im=new Image();im.src='/pet/'+f;im.className='pet-img';el.appendChild(im);
  document.getElementById('petBubble').textContent=s};
window.__pet('busy');cur.textContent='当前：busy';
</script></body></html>
